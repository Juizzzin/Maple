name: Build Lazure Binaries

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build Binary (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --onefile --uac-admin --icon="assets/maple.ico" --name Maple maple.py

    - name: Build Binary (Linux & Mac)
      if: matrix.os != 'windows-latest'
      run: pyinstaller --onefile --name Maple maple.py

    - name: Upload Finished Binary
      uses: actions/upload-artifact@v4
      with:
        name: Maple-${{ matrix.os }}
        path: |
          dist/Maple
          dist/Maple.exe
